image:
  repository: ghcr.io/simintero/enstellar-case
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 3013

replicaCount: 2

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

podAnnotations:
  sim.io/rls-context: "true"

env:
  TEMPORAL_NAMESPACE: "simintero"
