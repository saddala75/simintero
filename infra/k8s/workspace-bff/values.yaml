image:
  repository: ghcr.io/simintero/enstellar-workspace-bff
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 3021

replicaCount: 2

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

podAnnotations:
  sim.io/rls-context: "true"

env:
  ENSTELLAR_CASE_URL: "http://enstellar-case.simintero.svc.cluster.local:3013"
  REVITAL_URL: "http://revital-pipeline.simintero.svc.cluster.local:3014"
