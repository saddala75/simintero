apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-db-clients
  namespace: simintero
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              sim.io/db-client: "true"
      ports:
        - protocol: TCP
          port: 5432
