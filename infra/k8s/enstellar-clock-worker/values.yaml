image:
  repository: ghcr.io/simintero/enstellar-clock
  tag: latest
  pullPolicy: IfNotPresent

worker: true

replicaCount: 1

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 250m

podAnnotations:
  sim.io/rls-context: "true"

env:
  TASK_QUEUE: "clock-workflow"
  TEMPORAL_NAMESPACE: "simintero"
