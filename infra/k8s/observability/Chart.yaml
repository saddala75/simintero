apiVersion: v2
name: simintero-observability
description: OTel Collector + Prometheus + Tempo + Loki + Grafana for Simintero
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: prometheus
    version: "25.24.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: tempo
    version: "1.9.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: tempo.enabled
  - name: loki
    version: "6.7.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: loki.enabled
  - name: grafana
    version: "8.3.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled
