image:
  repository: ghcr.io/simintero/enstellar-workflow
  tag: latest
  pullPolicy: IfNotPresent

worker: true

replicaCount: 2

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

podAnnotations:
  sim.io/rls-context: "true"

env:
  TASK_QUEUE: "pa-workflow"
  TEMPORAL_NAMESPACE: "simintero"
