image:
  repository: ghcr.io/simintero/revital-pipeline
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 3014

replicaCount: 2

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

podAnnotations:
  sim.io/rls-context: "true"

env:
  MODEL_GATEWAY_URL: "http://model-gateway.simintero.svc.cluster.local:3011"
