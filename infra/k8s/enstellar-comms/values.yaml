image:
  repository: ghcr.io/simintero/enstellar-comms
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 3022

replicaCount: 2

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

podAnnotations:
  sim.io/rls-context: "true"

env:
  FAX_PROVIDER_URL: "https://fax.example.com"
  PORTAL_URL: "https://portal.simintero.io"
