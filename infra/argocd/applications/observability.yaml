apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simintero-observability
  namespace: argocd
spec:
  project: simintero
  source:
    repoURL: https://github.com/simintero/simintero
    targetRevision: HEAD
    path: infra/k8s/observability
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
