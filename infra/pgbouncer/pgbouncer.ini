[databases]
simintero = host=postgres port=5432 dbname=simintero
workflow  = host=postgres port=5432 dbname=workflow
keycloak  = host=postgres port=5432 dbname=keycloak
hapi      = host=postgres port=5432 dbname=hapi

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
# Production security: SCRAM-SHA-256 authentication required (scram-sha-256/md5 in userlist)
auth_type   = scram-sha-256
auth_file   = /etc/pgbouncer/userlist.txt
pool_mode   = transaction
max_client_conn = 500
default_pool_size = 20
server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits,search_path
