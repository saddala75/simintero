[databases]
simintero = host=postgres port=5432 dbname=simintero
workflow  = host=postgres port=5432 dbname=workflow
keycloak  = host=postgres port=5432 dbname=keycloak
hapi      = host=postgres port=5432 dbname=hapi

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
# PRODUCTION SECURITY: SCRAM-SHA-256 authentication required.
# The auth_file (userlist.txt) MUST contain SCRAM-SHA-256 hashes, not plaintext.
# See userlist.txt for instructions on generating SCRAM-SHA-256 hashes from PostgreSQL.
#
# DEVELOPMENT: For local development with docker-compose, use:
#   - pgbouncer.dev.ini (auth_type = md5)
#   - userlist.dev.txt (plaintext passwords)
# See docker-compose.override.yml or mount instructions to use dev config.
auth_type   = scram-sha-256
auth_file   = /etc/pgbouncer/userlist.txt
pool_mode   = transaction
max_client_conn = 500
default_pool_size = 20
server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits,search_path
