version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sim
      POSTGRES_PASSWORD: sim
      POSTGRES_DB: simintero
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sim -d simintero"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d

  redpanda:
    image: redpandadata/redpanda:v23.3.5
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr 0.0.0.0:9092
      - --advertise-kafka-addr localhost:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 10s
      retries: 10

  document-service:
    build:
      context: ../../
      dockerfile: platform/services/document/Dockerfile
    environment:
      DATABASE_URL: postgres://sim:sim@postgres:5432/simintero
      OBJECT_STORE_DIR: /tmp/simintero-docs
      PRESIDIO_ANALYZER_URL: http://presidio-analyzer:5001
      PRESIDIO_ANONYMIZER_URL: http://presidio-anonymizer:5002
      PORT: "3010"
    ports:
      - "3010:3010"
    depends_on:
      postgres:
        condition: service_healthy

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    platform: linux/amd64
    ports:
      - "5001:5001"
    environment:
      - GRPC_MAX_RECEIVE_MESSAGE_LENGTH=52428800

  presidio-anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:latest
    platform: linux/amd64
    ports:
      - "5002:5002"

  opa:
    image: openpolicyagent/opa:0.65.0-rootless
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policies
    ports:
      - "8181:8181"
    volumes:
      - ../../infra/opa/policies:/policies:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8181/health | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 10
