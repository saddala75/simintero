default:
  paths:
    - "../../specs/**/*.feature"
  require:
    - "src/world.ts"
    - "src/hooks.ts"
    - "src/steps/**/*.steps.ts"
  requireModule:
    - "ts-node/register"
  format:
    - "progress-bar"
    - "json:reports/cucumber-report.json"
  formatOptions:
    snippetInterface: "async-await"
  timeout: 30000
