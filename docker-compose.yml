networks:
  sim-net:
    driver: bridge

volumes:
  postgres-data:
  redpanda-data:
  temporal-data:
  minio-data:
  opensearch-data:
  ollama-data:

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: simintero
      POSTGRES_USER: sim
      POSTGRES_PASSWORD: devpassword
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - sim-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sim -d simintero"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10-alpine
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      -url=jdbc:postgresql://postgres:5432/simintero
      -user=sim
      -password=devpassword
      -locations=filesystem:/flyway/sql
      migrate
    volumes:
      - ./platform/services/db-migrations/migrations:/flyway/sql:ro
    networks:
      - sim-net

  redpanda:
    image: redpandadata/redpanda:v24.1.7
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
    ports:
      - "9092:9092"
      - "19092:19092"
      - "8082:8082"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - sim-net
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  temporal:
    image: temporalio/auto-setup:1.24
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=sim
      - POSTGRES_PWD=devpassword
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sim-net

  temporal-ui:
    image: temporalio/ui:latest
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8088:8080"
    depends_on:
      - temporal
    networks:
      - sim-net

  opa:
    image: openpolicyagent/opa:latest
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policies
    ports:
      - "8181:8181"
    volumes:
      - ./platform/services/opa-policies:/policies:ro
    networks:
      - sim-net

  # ── Node.js services ───────────────────────────────────────────────────────

  document-service:
    build:
      context: .
      dockerfile: platform/services/document/Dockerfile
    environment:
      DATABASE_URL: postgres://sim:devpassword@postgres:5432/simintero
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: simintero
      NODE_ENV: development
      PORT: "3010"
    ports:
      - "3010:3010"
    depends_on:
      flyway:
        condition: service_completed_successfully
    networks:
      - sim-net

  model-gateway:
    build:
      context: .
      dockerfile: platform/services/model-gateway/Dockerfile
    environment:
      DATABASE_URL: postgres://sim:devpassword@postgres:5432/simintero
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: simintero
      OPA_URL: http://opa:8181
      VKAS_URL: http://vkas:3040
      NODE_ENV: development
      PORT: "3011"
    ports:
      - "3011:3011"
    depends_on:
      - flyway
      - opa
    networks:
      - sim-net

  control-plane:
    build:
      context: .
      dockerfile: platform/services/control-plane/Dockerfile
    environment:
      DATABASE_URL: postgres://sim:devpassword@postgres:5432/simintero
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: simintero
      KEYCLOAK_URL: "${KEYCLOAK_URL:-}"
      KEYCLOAK_CLIENT_SECRET: "${KEYCLOAK_CLIENT_SECRET:-}"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM:-simintero}"
      KEYCLOAK_CLIENT_ID: "${KEYCLOAK_CLIENT_ID:-control-plane}"
      NODE_ENV: development
      PORT: "3012"
    ports:
      - "3012:3012"
    depends_on:
      - flyway
    networks:
      - sim-net

  revital-pipeline:
    build:
      context: .
      dockerfile: modules/revital/pipeline/Dockerfile
    environment:
      DATABASE_URL: postgres://sim:devpassword@postgres:5432/simintero
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: simintero
      MODEL_GATEWAY_URL: http://model-gateway:3011
      NODE_ENV: development
      PORT: "3014"
    ports:
      - "3014:3014"
    networks:
      - sim-net

  qualitron:
    build:
      context: .
      dockerfile: modules/qualitron/execution/Dockerfile
    environment:
      DATABASE_URL: postgres://sim:devpassword@postgres:5432/simintero
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: simintero
      DIGICORE_RUNTIME_URL: http://digicore-runtime:8083
      NODE_ENV: development
      PORT: "3015"
    ports:
      - "3015:3015"
    networks:
      - sim-net

  claims-service:
    build:
      context: .
      dockerfile: modules/claims/service/Dockerfile
    environment:
      DATABASE_URL: postgres://sim:devpassword@postgres:5432/simintero
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: simintero
      CLEARINGHOUSE_URL: "${CLEARINGHOUSE_URL:-}"
      CLEARINGHOUSE_API_KEY: "${CLEARINGHOUSE_API_KEY:-}"
      CLEARINGHOUSE_SUBMITTER_ID: "${CLEARINGHOUSE_SUBMITTER_ID:-SIMINTERO}"
      NODE_ENV: development
      PORT: "3016"
    ports:
      - "3016:3016"
    networks:
      - sim-net

  automation-service:
    build:
      context: .
      dockerfile: modules/automation/service/Dockerfile
    environment:
      DATABASE_URL: postgres://sim:devpassword@postgres:5432/simintero
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: simintero
      OPA_URL: http://opa:8181
      NODE_ENV: development
      PORT: "3017"
    ports:
      - "3017:3017"
    networks:
      - sim-net

  market-bundles-service:
    build:
      context: .
      dockerfile: modules/market-bundles/service/Dockerfile
    environment:
      DATABASE_URL: postgres://sim:devpassword@postgres:5432/simintero
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: simintero
      NODE_ENV: development
      PORT: "3018"
    ports:
      - "3018:3018"
    networks:
      - sim-net

  search-service:
    build:
      context: .
      dockerfile: modules/search/query-api/Dockerfile
    environment:
      DATABASE_URL: postgres://sim:devpassword@postgres:5432/simintero
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: simintero
      SEARCH_INDEX_SIZE: "10000"
      NODE_ENV: development
      PORT: "3019"
    ports:
      - "3019:3019"
    networks:
      - sim-net

  analytics-service:
    build:
      context: .
      dockerfile: modules/analytics/service/Dockerfile
    environment:
      DATABASE_URL: postgres://sim:devpassword@postgres:5432/simintero
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: simintero
      NODE_ENV: development
      PORT: "3020"
    ports:
      - "3020:3020"
    networks:
      - sim-net

  vsac-proxy:
    build:
      context: .
      dockerfile: integration/connectors/vsac/Dockerfile
    environment:
      VSAC_BASE_URL: "${VSAC_BASE_URL:-https://vsac.nlm.nih.gov/vsac/svs}"
      VSAC_API_KEY: "${VSAC_API_KEY:-}"
      PORT: "3051"
    ports:
      - "3051:3051"
    networks:
      - sim-net

  cds-hooks:
    build:
      context: .
      dockerfile: integration/connectors/cds-hooks/Dockerfile
    environment:
      CONTROL_PLANE_URL: http://control-plane:3012
      # interop runs in services/enstellar-compose; unified into this stack in C4
      INTEROP_FHIR_BASE_URL: http://interop:8080/fhir
      PORT: "3050"
    ports:
      - "3050:3050"
    depends_on:
      - control-plane
    networks:
      - sim-net

  # ── Java services ──────────────────────────────────────────────────────────

  digicore-runtime:
    build:
      context: modules/digicore/runtime
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "8083"
      POSTGRES_URL: jdbc:postgresql://postgres:5432/simintero
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sim-net

  # ── Shared infra (Enstellar) ───────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: "${KEYCLOAK_DB_PASSWORD:-keycloak_secret}"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:-admin}"
      KC_HOSTNAME_URL: http://localhost:8081
      TEST_CLIENT_SECRET: "${TEST_CLIENT_SECRET:-test-secret}"
      E2E_PASSWORD: "${E2E_PASSWORD:-e2e-pass}"
      TEST_REVIEWER_PASSWORD: "${TEST_REVIEWER_PASSWORD:-reviewer-password}"
    ports:
      - "8081:8080"
    volumes:
      - ./infra/keycloak/simintero-realm.json:/opt/keycloak/data/import/simintero-realm.json:ro
      - ./infra/keycloak/simintero-realm-ci-overlay.json:/opt/keycloak/data/import/simintero-realm-ci-overlay.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sim-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; printf 'GET /realms/master HTTP/1.0\\r\\nHost: 127.0.0.1\\r\\n\\r\\n' >&3; read -t 5 line <&3; [[ \"$$line\" == *200* ]]"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  minio:
    image: minio/minio:RELEASE.2024-06-04T19-20-08Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - sim-net
    healthcheck:
      test: ["CMD-SHELL", "mc alias set local http://127.0.0.1:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD --api S3v4 > /dev/null 2>&1 && mc ready local"]
      interval: 30s
      timeout: 10s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.14.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - sim-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - sim-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - sim-net
