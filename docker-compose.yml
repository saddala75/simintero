networks:
  sim-net:
    driver: bridge

volumes:
  postgres-data:
  redpanda-data:
  temporal-data:
  minio-data:
  opensearch-data:
  ollama-data:
  prometheus-data:
  tempo-data:
  loki-data:
  grafana-data:

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: simintero
      POSTGRES_USER: sim
      POSTGRES_PASSWORD: devpassword
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - sim-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sim -d simintero"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    ports:
      - "5433:5432"
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infra/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sim-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10-alpine
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      -url=jdbc:postgresql://postgres:5432/simintero
      -user=sim
      -password=devpassword
      -locations=filesystem:/flyway/sql
      migrate
    volumes:
      - ./platform/services/db-migrations/migrations:/flyway/sql:ro
    networks:
      - sim-net

  redpanda:
    image: redpandadata/redpanda:v24.1.7
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
    ports:
      - "9092:9092"
      - "19092:19092"
      - "8082:8082"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - sim-net
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  temporal:
    image: temporalio/auto-setup:1.24
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=sim
      - POSTGRES_PWD=devpassword
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/config/dynamicconfig/docker.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tctl --address $(hostname -i):7233 cluster health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - sim-net

  temporal-ui:
    image: temporalio/ui:latest
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8088:8080"
    depends_on:
      - temporal
    networks:
      - sim-net

  temporal-admin:
    # Reuse the already-pulled auto-setup image — it ships the `temporal` CLI + a shell
    # (the admin-tools image has no 1.24 tag). Override its entrypoint to just register the namespace.
    image: temporalio/auto-setup:1.24
    entrypoint: ["/bin/sh", "-c"]
    depends_on:
      temporal:
        condition: service_healthy
    command:
      - |
        temporal operator namespace describe simintero --address temporal:7233 >/dev/null 2>&1 \
          || temporal operator namespace create simintero --address temporal:7233 --retention 14d
        echo "namespace simintero ready"
    restart: "no"
    networks:
      - sim-net

  opa:
    image: openpolicyagent/opa:latest
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policies
    ports:
      - "8181:8181"
    volumes:
      - ./platform/services/opa-policies:/policies:ro
    networks:
      - sim-net

  # ── Node.js services ───────────────────────────────────────────────────────

  document-service:
    build:
      context: .
      dockerfile: platform/services/document/Dockerfile
    environment:
      DATABASE_URL: postgres://sim_app:devpassword@pgbouncer:5432/simintero
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: simintero
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_BUCKET: simintero-docs
      NODE_ENV: development
      PORT: "3010"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: document-service
    ports:
      - "3010:3010"
    depends_on:
      otel-collector:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3010/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - sim-net

  document-worker:
    build:
      context: .
      dockerfile: platform/services/document/Dockerfile
    command: ["node", "dist/worker.js"]
    environment:
      DATABASE_URL: postgres://sim_app:devpassword@pgbouncer:5432/simintero
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: simintero
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_BUCKET: simintero-docs
      NODE_ENV: development
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: document-worker
    depends_on:
      otel-collector:
        condition: service_healthy
      temporal-admin:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    networks:
      - sim-net

  model-gateway:
    build:
      context: .
      dockerfile: platform/services/model-gateway/Dockerfile
    environment:
      DATABASE_URL: postgres://sim_app:devpassword@pgbouncer:5432/simintero
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: simintero
      OPA_URL: http://opa:8181
      VKAS_URL: http://vkas:3040
      NODE_ENV: development
      PORT: "3011"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: model-gateway
    ports:
      - "3011:3011"
    depends_on:
      otel-collector:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      opa:
        condition: service_started
      vkas:
        condition: service_healthy
      mock-llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3011/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
