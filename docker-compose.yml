      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: analytics-api
    ports:
      - "3020:3020"
    networks:
      - sim-net
    depends_on:
      otel-collector:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3020/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  vsac-proxy:
    build:
      context: .
      dockerfile: integration/connectors/vsac/Dockerfile
    environment:
      VSAC_BASE_URL: "${VSAC_BASE_URL:-https://vsac.nlm.nih.gov/vsac/svs}"
      VSAC_API_KEY: "${VSAC_API_KEY:-}"
      PORT: "3051"
    ports:
      - "3051:3051"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3051/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sim-net

  cds-hooks:
    build:
      context: .
      dockerfile: integration/connectors/cds-hooks/Dockerfile
    environment:
      CONTROL_PLANE_URL: http://control-plane:3012
      # interop runs in services/enstellar-compose; unified into this stack in C4
      INTEROP_FHIR_BASE_URL: http://interop:8080/fhir
      PORT: "3050"
    ports:
      - "3050:3050"
    depends_on:
      - control-plane
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3050/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sim-net

  digicore-authoring:
    build:
      context: .
      dockerfile: modules/digicore/authoring/Dockerfile
    environment:
      PORT: "3052"
      RUNTIME_BASE_URL: http://digicore-runtime:8083
      VKAS_BASE_URL: http://vkas:3040
      GOVERNANCE_BASE_URL: http://digicore-governance:3053
      TERMINOLOGY_GW_BASE_URL: http://terminology-service:3030
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_CLIENT_ID: digicore-authoring
    ports:
      - "3052:3052"
    depends_on:
      vkas:
        condition: service_healthy
      digicore-runtime:
        condition: service_healthy
      digicore-governance:
        condition: service_started
      terminology-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3052/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - sim-net

  digicore-governance:
    build:
      context: .
      dockerfile: modules/digicore/governance/Dockerfile
    environment:
      PORT: "3053"
      VKAS_BASE_URL: http://vkas:3040
      GOVERNANCE_DB_URL: postgres://sim_app:devpassword@pgbouncer:5432/simintero
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_CLIENT_ID: digicore-governance
    ports:
      - "3053:3053"
    depends_on:
      vkas:
        condition: service_healthy
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3053/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - sim-net

  # ── Java services ──────────────────────────────────────────────────────────

  digicore-runtime:
    build:
      context: modules/digicore/runtime
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "8083"
      POSTGRES_URL: jdbc:postgresql://pgbouncer:5432/simintero
      SPRING_DATASOURCE_URL: jdbc:postgresql://pgbouncer:5432/simintero
      SPRING_DATASOURCE_USERNAME: sim_app
      SPRING_DATASOURCE_PASSWORD: devpassword
      VKAS_URL: http://vkas:3040
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: digicore-runtime
    ports:
      - "8083:8083"
    depends_on:
      otel-collector:
        condition: service_healthy
      postgres:
        condition: service_healthy
      vkas:
        condition: service_healthy
    networks:
      - sim-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8083/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Shared infra (Enstellar) ───────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://pgbouncer:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: "${KEYCLOAK_DB_PASSWORD:-keycloak_secret}"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:-admin}"
      KC_HOSTNAME_URL: "${KEYCLOAK_PUBLIC_URL:-http://localhost:8081}"
      TEST_CLIENT_SECRET: "${TEST_CLIENT_SECRET:-test-secret}"
      E2E_PASSWORD: "${E2E_PASSWORD:-e2e-pass}"
      TEST_REVIEWER_PASSWORD: "${TEST_REVIEWER_PASSWORD:-reviewer-password}"
      CONTROL_PLANE_CLIENT_SECRET: "${KEYCLOAK_CLIENT_SECRET:-control-plane-secret}"
    ports:
      - "8081:8080"
    volumes:
      # Only the self-contained base realm is mounted into the import dir: it already folds
      # in the CI test client (enstellar-test-client) + the CI/E2E reviewer users, so no
      # separate overlay file is needed (the former ci-overlay was a redundant subset and
      # has been retired).
      - ./infra/keycloak/simintero-realm.json:/opt/keycloak/data/import/simintero-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sim-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; printf 'GET /realms/master HTTP/1.0\\r\\nHost: 127.0.0.1\\r\\n\\r\\n' >&3; read -t 5 line <&3; [[ \"$$line\" == *200* ]]"]
      interval: 30s
      timeout: 10s
      retries: 10
      # Keycloak's JVM + realm import can take ~280s under the full stack on a RAM-constrained
      # host; a generous start_period prevents `up --wait` marking it unhealthy before it boots.
      start_period: 300s

  minio:
    image: minio/minio:RELEASE.2024-06-04T19-20-08Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - sim-net
    healthcheck:
      test: ["CMD-SHELL", "mc alias set local http://127.0.0.1:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD --api S3v4 > /dev/null 2>&1 && mc ready local"]
      interval: 30s
      timeout: 10s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.14.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - sim-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - sim-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - sim-net

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — http://localhost:8025
    networks:
      - sim-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8025/livez"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Enstellar app services (C4a) ───────────────────────────────────────────

  hapi:
    image: hapiproject/hapi:v7.4.0
    expose: ["8080"]
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      spring.datasource.url: jdbc:postgresql://pgbouncer:5432/hapi
      spring.datasource.username: hapi
      spring.datasource.password: "${HAPI_DB_PASSWORD:-hapi_secret}"
      spring.datasource.driverClassName: org.postgresql.Driver
      spring.jpa.properties.hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgres94Dialect
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_multiple_delete: "true"
      hapi.fhir.allow_external_references: "true"
      hapi.fhir.validation.requests_enabled: "true"
      hapi.fhir.validation.responses_enabled: "false"
      hapi.fhir.implementationguides[0].name: hl7.fhir.us.core
      hapi.fhir.implementationguides[0].version: 5.0.1
      hapi.fhir.implementationguides[0].reloadExisting: "false"
      hapi.fhir.implementationguides[1].name: hl7.fhir.us.davinci-pas
      hapi.fhir.implementationguides[1].version: 2.0.1
      hapi.fhir.implementationguides[1].reloadExisting: "false"
    volumes:
      - ./services/enstellar-compose/healthcheck/healthcheck.jar:/healthcheck.jar:ro
    networks: [sim-net]
    healthcheck:
      test: ["CMD", "java", "-jar", "/healthcheck.jar", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 900s

  interop:
    build:
      context: .
      dockerfile: services/enstellar-interop/Dockerfile
    expose: ["8080"]
    ports:
      - "8080:8080"
    depends_on:
      otel-collector:
        condition: service_healthy
      postgres:
        condition: service_healthy
      hapi:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      digicore-runtime:
        condition: service_healthy
      document-service:
        condition: service_healthy
    environment:
      INTEROP_DB_URL: jdbc:postgresql://pgbouncer:5432/hapi
      INTEROP_DB_USER: hapi
      INTEROP_DB_PASSWORD: "${HAPI_DB_PASSWORD:-hapi_secret}"
      DIGICORE_BASE_URL: http://digicore-runtime:8083
      DOCUMENT_SERVICE_URL: http://document-service:3010
      HAPI_BASE_URL: http://hapi:8080/fhir
      HAPI_PROXY_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_SECURE: "false"
      MINIO_BUCKET: enstellar-raw-bundles
      NORMALIZATION_URL: http://workflow-engine:8000
      KEYCLOAK_ISSUER_URI: "${KEYCLOAK_PUBLIC_URL:-http://localhost:8081}/realms/simintero"
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/simintero/protocol/openid-connect/certs
      EXPECTED_AUDIENCE: enstellar-api
      INTEROP_CONFORMANCE_TEST_MODE: "${INTEROP_CONFORMANCE_TEST_MODE:-false}"
      INTEROP_CONFORMANCE_TEST_TOKEN: "${INTEROP_CONFORMANCE_TEST_TOKEN:-conformance-test-token}"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: interop
    volumes:
      - ./services/enstellar-compose/healthcheck/healthcheck.jar:/healthcheck.jar:ro
    networks: [sim-net]
    healthcheck:
      test: ["CMD", "java", "-jar", "/healthcheck.jar", "http://localhost:8080/fhir/metadata"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s

  workflow-engine:
    build:
      context: .
      dockerfile: services/enstellar-workflow/Dockerfile
    expose: ["8000"]
    depends_on:
      otel-collector:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
      digicore-runtime:
        condition: service_healthy
      document-service:
        condition: service_healthy
      revital-pipeline:
        condition: service_healthy
    environment:
      WORKFLOW_DB_URL: postgresql+asyncpg://workflow:${WORKFLOW_DB_PASSWORD:-workflow_secret}@pgbouncer:5432/workflow
      # Second pool target for the fabric bridge: the simintero DB as sim_app
      # (un-prefixed env, read via validation_alias). asyncpg.create_pool opens
      # this raw postgresql:// DSN alongside the workflow pool (app.state.fabric_pool).
      SIMINTERO_DB_URL: postgresql://sim_app:devpassword@pgbouncer:5432/simintero
      WORKFLOW_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      WORKFLOW_OIDC_ISSUER: "${KEYCLOAK_PUBLIC_URL:-http://localhost:8081}/realms/simintero"
      WORKFLOW_KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/simintero/protocol/openid-connect/certs
      WORKFLOW_OPA_URL: http://opa:8181
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_SECURE: "false"
      MINIO_BUCKET: enstellar-raw-bundles
      DIGICORE_BASE_URL: http://digicore-runtime:8083
      WORKFLOW_DOCUMENT_SERVICE_URL: http://document-service:3010
      # RevitalClient lives in the connectors package and reads REVITAL_BASE_URL
      # (validation_alias), so this env var must be exactly REVITAL_BASE_URL (un-prefixed).
      REVITAL_BASE_URL: http://revital-pipeline:3014
      WORKFLOW_REVITAL_BASE_URL: http://revital-pipeline:3014
      # Slice S3: short SLA poll interval so the unified smoke observes a breach+escalate
      # within seconds (the in-process SlaPoller scans running clocks every N seconds).
      WORKFLOW_SLA_POLL_INTERVAL_SECONDS: "5"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: enstellar-workflow
      # SMTP — required for email notice delivery (SmtpEmailSender)
      WORKFLOW_SMTP_HOST: "${SMTP_HOST:-mailpit}"
      WORKFLOW_SMTP_PORT: "${SMTP_PORT:-1025}"
      WORKFLOW_SMTP_USERNAME: "${SMTP_USERNAME:-}"
      WORKFLOW_SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      WORKFLOW_SMTP_FROM_ADDR: "${SMTP_FROM_ADDR:-noreply@simintero.local}"
      # OIDC audience — must match Keycloak client ID; enforced in all environments
      WORKFLOW_OIDC_AUDIENCE: "${WORKFLOW_OIDC_AUDIENCE:-enstellar-workflow}"
    networks: [sim-net]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  enstellar-poller:
    build:
      context: .
      dockerfile: services/enstellar-poller/Dockerfile
    expose: ["8002"]
    ports:
      - "8002:8002"
    depends_on:
      otel-collector:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      revital-pipeline:
        condition: service_healthy
    environment:
      WORKFLOW_DB_URL: postgresql+asyncpg://workflow:${WORKFLOW_DB_PASSWORD:-workflow_secret}@pgbouncer:5432/workflow
      REVITAL_BASE_URL: http://revital-pipeline:3014
      WORKFLOW_SLA_POLL_INTERVAL_SECONDS: "5"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: enstellar-poller
    deploy:
      replicas: 1
    networks: [sim-net]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/ready')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  portal-bff:
    build:
      context: .
      dockerfile: services/enstellar-portal-bff/Dockerfile
    expose: ["8001"]
    ports:
      - "8001:8001"
    depends_on:
      otel-collector:
        condition: service_healthy
      workflow-engine:
        condition: service_healthy
      interop:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      BFF_WORKFLOW_ENGINE_URL: http://workflow-engine:8000
      BFF_FHIR_API_URL: http://interop:8080/fhir
      BFF_CRD_API_URL: http://interop:8080/cds-services
      BFF_KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/simintero/protocol/openid-connect/certs
      BFF_OIDC_ISSUER: "${KEYCLOAK_PUBLIC_URL:-http://localhost:8081}/realms/simintero"
      # OIDC audience — must match Keycloak client ID
      BFF_OIDC_AUDIENCE: "${BFF_OIDC_AUDIENCE:-enstellar-api}"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: enstellar-portal-bff
    networks: [sim-net]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: services/enstellar-portal/Dockerfile
      args:
        VITE_KEYCLOAK_URL: "${VITE_KEYCLOAK_URL:-http://localhost:8081}"
        VITE_KEYCLOAK_REALM: "${VITE_KEYCLOAK_REALM:-simintero}"
        VITE_KEYCLOAK_CLIENT_ID: "${VITE_KEYCLOAK_CLIENT_ID:-enstellar-app}"
    ports:
      - "5173:80"
    depends_on:
      portal-bff:
        condition: service_healthy
    networks: [sim-net]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Observability ──────────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    command: ["--config=/etc/otel/collector-config.yaml"]
    volumes:
      - ./infra/otel/collector-config.yaml:/etc/otel/collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - sim-net
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config=/etc/otel/collector-config.yaml"]
      interval: 5s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
      - --log.level=warn
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - sim-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 10

  tempo:
    image: grafana/tempo:2.5.0
    user: "0"
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"
    networks:
      - sim-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 5s
      timeout: 3s
      retries: 15

  loki:
    image: grafana/loki:3.1.0
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./infra/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - sim-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 5s
      timeout: 3s
      retries: 15

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-changeme}"
      GF_LOG_LEVEL: warn
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - sim-net
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Inferno FHIR conformance test kits (profile: conformance) ──────────────

  inferno-us-core:
    image: ghcr.io/inferno-community/us-core-test-kit:latest
    profiles: [conformance]
    ports:
      - "4545:4567"
    environment:
      FHIR_SERVER_URL: http://interop:8080/fhir
    depends_on:
      interop:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4567/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - sim-net

  inferno-smart:
    image: ghcr.io/inferno-community/smart-app-launch-test-kit:latest
    profiles: [conformance]
