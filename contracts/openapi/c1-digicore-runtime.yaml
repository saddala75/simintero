openapi: "3.1.0"
info:
  title: Digicore Runtime Contract (C-1)
  version: "2.0.0"
  description: |
    Contract between Digicore (digicore-runtime) and consumers (Enstellar interop,
    Enstellar workflow, Revital). Generated TS types are in
    platform/libs/generated/c1-digicore-runtime/.

    This is the surface the digicore-runtime service actually serves and that the
    Enstellar interop (Java) and workflow (Python) clients call:
      POST /v1/runtime/coverage-discovery
      POST /v1/runtime/evaluate
      POST /v1/runtime/evidence-requirements:resolve
      GET  /v1/runtime/dtr-packages/{ref}

    Field-naming note: coverage-discovery and evidence-requirements:resolve use
    snake_case JSON (Map-backed handlers); evaluate uses camelCase JSON (record-backed
    handler). Both are documented as served below.

    Breaking changes require a new major version and a deprecation window.

paths:
  /v1/runtime/coverage-discovery:
    post:
      operationId: coverageDiscovery
      x-sim-authz:
        action: runtime.read
        resource_type: coverage_rule
      description: |
        Returns whether prior authorization is required for a service, the governing
        rule references, the pinned policy artifact URNs, and the DTR package ref (if any).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [service_code]
              properties:
                service_code:   { type: string, description: "FHIR/CPT service code or label" }
                procedure_code: { type: string, description: "Procedure (CPT) code" }
      responses:
        "200":
          description: Coverage discovery result
          content:
            application/json:
              schema:
                type: object
                required: [pa_required, governing_rules, pins, dtr_package_ref]
                properties:
                  pa_required: { type: boolean }
                  governing_rules:
                    type: array
                    items:
                      type: object
                      required: [rule_id, version]
                      properties:
                        rule_id: { type: string }
                        version: { type: string }
                  pins:
                    type: array
                    description: "Pinned policy artifact URNs (e.g. urn:sim:policy:...:1.0.0)"
                    items: { type: string }
                  dtr_package_ref:
                    type: ["string", "null"]
                    description: "DTR package ref, or null when no DTR package applies"

  /v1/runtime/evaluate:
    post:
      operationId: evaluate
      x-sim-authz:
        action: runtime.evaluate
        resource_type: coverage_rule
      description: |
        Deterministic coverage evaluation. Identical (request body + pins) yields a
        byte-identical outcome, requirementGaps, and logicPath.
        autoDetermination.eligible is true ONLY when outcome == meets_all (safety invariant).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [caseId, evidence, pins, serviceCode]
              properties:
                caseId:      { type: string }
                evidence:
                  type: object
                  additionalProperties: true
                  description: "Evidence map keyed by requirement_id; values are booleans/strings the ELM evaluator reads"
                pins:
                  type: array
                  description: "Caller-supplied pinned artifact URNs; when present the engine does NOT call VKAS"
                  items: { type: string }
                serviceCode: { type: string }
      responses:
        "200":
          description: Evaluation result with resolved pins and trace ref
          content:
            application/json:
              schema:
                type: object
                required: [outcome, requirementGaps, logicPath, autoDetermination, pins, traceRef]
                properties:
                  outcome:
                    type: string
                    enum: [meets_all, not_met, indeterminate]
                  requirementGaps:
                    type: array
                    items:
                      type: object
                      required: [requirement_id]
                      properties:
                        requirement_id: { type: string }
                        blocking:       { type: boolean }
                  logicPath:
                    type: array
                    description: "Ordered evaluation trace steps"
                    items:
                      type: object
                      additionalProperties: true
                  autoDetermination:
                    type: object
                    required: [eligible]
                    properties:
                      eligible:
                        type: boolean
                        description: "true ONLY when outcome == meets_all"
                  pins:
                    type: array
                    description: "Resolved pinned artifact URNs"
                    items: { type: string }
                  traceRef:
                    type: string
                    pattern: "^trace:"
                    description: "Trace reference of the form trace:<uuid>"

  /v1/runtime/evidence-requirements:resolve:
    post:
      operationId: resolveEvidenceRequirements
      x-sim-authz:
        action: runtime.read
        resource_type: coverage_rule
      description: |
        Returns the set of evidence requirements (extraction targets) for a given
        service code. Consumed by Enstellar interop (DTR/CRD) and Revital.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [service_code]
              properties:
                service_code: { type: string }
      responses:
        "200":
          description: Evidence requirements for the service code
          content:
            application/json:
              schema:
                type: object
                required: [service_code, requirements]
                properties:
                  service_code: { type: string }
                  requirements:
                    type: array
                    items:
                      type: object
                      required: [requirement_id, display, required]
                      properties:
                        requirement_id: { type: string }
                        display:        { type: string }
                        required:       { type: boolean }

  /v1/runtime/dtr-packages/{ref}:
    get:
      operationId: getDtrPackage
      x-sim-authz:
        action: runtime.read
        resource_type: coverage_rule
      description: |
        Fetch a DTR questionnaire package by ref. The ref is the percent-encoded
        dtr_package_ref returned by coverage-discovery. Returns the FHIR Questionnaire
        package JSON, or 404 when no package exists for the ref.
      parameters:
        - in: path
          name: ref
          required: true
          schema: { type: string }
          description: "DTR package ref (percent-encoded URN)"
      responses:
        "200":
          description: DTR questionnaire package (FHIR Questionnaire JSON)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: No DTR package found for the given ref
