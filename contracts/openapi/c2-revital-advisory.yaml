openapi: "3.1.0"
info:
  title: Revital Advisory Contract (C-2)
  version: "1.0.0"
  description: |
    Contract between Revital (AI advisory engine) and consumers (Enstellar, clinical portal).
    Generated clients are in platform/libs/generated/c2-revital-advisory/.
    Breaking changes require a new major version and deprecation window.

paths:
  /v1/assist/analyze-case:
    post:
      operationId: analyzeCase
      summary: Request an AI-generated advisory for a UM case
      description: |
        Triggers Revital's advisory pipeline for the given case. When options.async is false
        (default), the request blocks until the advisory is complete (subject to a timeout).
        When options.async is true, returns immediately with status=queued and the advisory_id
        for subsequent polling or event-driven retrieval.
      x-sim-authz:
        action: advisory.analyze
        resource_type: case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [case_id, tenant_id]
              additionalProperties: false
              properties:
                case_id:
                  type: string
                  description: The UM case to analyze
                tenant_id:
                  type: string
                  description: Tenant that owns the case
                options:
                  type: object
                  additionalProperties: false
                  properties:
                    async:
                      type: boolean
                      default: false
                      description: When true, returns immediately with status=queued
                    evidence_requirement_refs:
                      type: array
                      items:
                        type: string
                      description: |
                        Subset of evidence requirement IDs (from Digicore C-1) to scope the analysis.
                        When empty, Revital evaluates all requirements for the case context.
                    pin_artifacts:
                      type: array
                      items:
                        type: object
                        required: [canonical_url, version]
                        properties:
                          canonical_url: { type: string, format: uri }
                          version:       { type: string }
                      description: Pin specific artifact versions for deterministic re-evaluation
                    max_latency_seconds:
                      type: integer
                      minimum: 10
                      maximum: 300
                      default: 60
                      description: Synchronous timeout in seconds (ignored when async=true)
      responses:
        "200":
          description: Advisory result (synchronous completion or async acceptance)
          content:
            application/json:
              schema:
                type: object
                required: [advisory_id, status, trace_ref]
                additionalProperties: false
                properties:
                  advisory_id:
                    type: string
                    pattern: "^adv_[0-9A-Z]{26}$"
                    description: Stable identifier for this advisory
                  status:
                    type: string
                    enum: [queued, processing, complete]
                    description: Current status of the advisory
                  advisory:
                    description: Present when status is complete (synchronous mode only)
                    $ref: "../../schemas/advisory-output.schema.json"
                  trace_ref:
                    type: string
                    pattern: "^trc_[0-9A-Z]{26}$"
                    description: Audit trace reference for this advisory request
        "202":
          description: Advisory accepted for async processing (only when options.async=true)
          content:
            application/json:
              schema:
                type: object
                required: [advisory_id, status, trace_ref]
                properties:
                  advisory_id:
                    type: string
                    pattern: "^adv_[0-9A-Z]{26}$"
                  status:
                    type: string
                    enum: [queued]
                  trace_ref:
                    type: string
                    pattern: "^trc_[0-9A-Z]{26}$"
        "422":
          description: Validation error or insufficient context to begin analysis
          content:
            application/problem+json:
              schema:
                type: object
                required: [code, detail]
                properties:
                  code:    { type: string, example: SIM-REV-INVALID-INPUT }
                  detail:  { type: string }
                  fields:  { type: array, items: { type: object } }
        "503":
          description: Advisory engine temporarily unavailable
          content:
            application/problem+json:
              schema:
                type: object
                required: [code, retry_after_seconds]
                properties:
                  code:                 { const: SIM-REV-UNAVAILABLE }
                  retry_after_seconds:  { type: integer }

  /v1/assist/feedback:
    post:
      operationId: submitFeedback
      summary: Submit reviewer feedback on an advisory
      description: |
        Records a clinical reviewer's assessment of an advisory's accuracy.
        Used for model performance monitoring, RLHF pipelines, and compliance audit.
      x-sim-authz:
        action: advisory.feedback
        resource_type: advisory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [advisory_id, reviewer_id, rating]
              additionalProperties: false
              properties:
                advisory_id:
                  type: string
                  pattern: "^adv_[0-9A-Z]{26}$"
                  description: The advisory being rated
                reviewer_id:
                  type: string
                  description: Identity of the reviewer (human actor id)
                rating:
                  type: string
                  enum: [accurate, partially_accurate, inaccurate]
                  description: Overall accuracy assessment of the advisory
                assertion_ratings:
                  type: array
                  description: Optional per-assertion ratings for fine-grained feedback
                  items:
                    type: object
                    required: [assertion_id, rating]
                    properties:
                      assertion_id: { type: string }
                      rating:       { type: string, enum: [accurate, partially_accurate, inaccurate] }
                      notes:        { type: ["string","null"] }
                notes:
                  type: ["string","null"]
                  maxLength: 2000
                  description: Free-text reviewer notes
      responses:
        "200":
          description: Feedback recorded successfully
          content:
            application/json:
              schema:
                type: object
                required: [feedback_id, recorded_at]
                additionalProperties: false
                properties:
                  feedback_id:
                    type: string
                    description: Unique identifier for the feedback record
                  recorded_at:
                    type: string
                    format: date-time
                    description: ISO 8601 timestamp when the feedback was persisted
        "404":
          description: Advisory not found
          content:
            application/problem+json:
              schema:
                type: object
                required: [code]
                properties:
                  code: { const: SIM-REV-ADVISORY-NOT-FOUND }
