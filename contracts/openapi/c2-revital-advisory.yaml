openapi: "3.1.0"
info:
  title: Revital Advisory API
  version: "1.0.0"
  description: >
    C-2 contract — governs how Enstellar requests AI analysis and receives advisory outputs.
    Every response carries classification=advisory. No field is accepted by decision.record.

paths:
  /v1/assist/analyses:
    post:
      operationId: requestAnalysis
      summary: Request case analysis (async)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalysisRequest'
      responses:
        '202':
          description: Analysis accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisAccepted'
        '409':
          description: AI disabled for tenant or workflow
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /v1/assist/analyses/{analysisId}:
    get:
      operationId: getAnalysis
      summary: Get advisory result
      parameters:
        - in: path
          name: analysisId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Advisory result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResult'
        '404':
          description: Analysis not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /v1/assist/analyses/{analysisId}/feedback:
    post:
      operationId: recordFeedback
      summary: Capture reviewer action on advisory outputs
      parameters:
        - in: path
          name: analysisId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
      responses:
        '204':
          description: Feedback recorded
        '404':
          description: Analysis not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /v1/assist/analyses/{analysisId}:reanalyze:
    post:
      operationId: reanalyze
      summary: Re-run analysis with current or pinned artifact versions
      parameters:
        - in: path
          name: analysisId
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Re-analysis accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisAccepted'
        '404':
          description: Analysis not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

components:
  schemas:
    AnalysisRequest:
      type: object
      required: [case_ref, analysis_kinds, inputs]
      properties:
        case_ref:
          type: string
        analysis_kinds:
          type: array
          items:
            type: string
            enum: [summary, extraction, completeness, triage]
        inputs:
          type: object
          required: [document_refs, case_context]
          properties:
            document_refs:
              type: array
              items:
                type: string
            questionnaire_responses:
              type: array
              items:
                type: object
                additionalProperties: true
            case_context:
              type: object
              properties:
                lob:
                  type: string
                urgency:
                  type: string
                service_lines:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
        evidence_requirements:
          type: object
          properties:
            requirements_ref:
              type: object
              additionalProperties: true
        priority:
          type: string
          enum: [interactive, batch]
          default: interactive

    AnalysisAccepted:
      type: object
      required: [analysis_id, operation]
      properties:
        analysis_id:
          type: string
        operation:
          type: string

    AnalysisResult:
      type: object
      required: [analysis_id, classification, status, case_ref, interaction]
      properties:
        analysis_id:
          type: string
        classification:
          type: string
          enum: [advisory]
        status:
          type: string
          enum: [processing, complete, partial, failed]
        case_ref:
          type: string
        interaction:
          $ref: '#/components/schemas/Interaction'
        summary:
          $ref: '#/components/schemas/SummaryBlock'
        extraction:
          $ref: '#/components/schemas/ExtractionBlock'
        completeness:
          $ref: '#/components/schemas/CompletenessBlock'
        triage:
          $ref: '#/components/schemas/TriageBlock'
        abstentions:
          type: array
          items:
            $ref: '#/components/schemas/Abstention'
        unprocessed_inputs:
          type: array
          items:
            type: object
            additionalProperties: true

    Interaction:
      type: object
      required: [model_binding, prompt, started_at, input_manifest]
      properties:
        model_binding:
          type: object
          required: [canonical_url, version]
          properties:
            canonical_url:
              type: string
            version:
              type: string
        prompt:
          type: object
          required: [canonical_url, version]
          properties:
            canonical_url:
              type: string
            version:
              type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        input_manifest:
          type: array
          items:
            type: object
            additionalProperties: true

    Assertion:
      type: object
      required: [id, text, citations, confidence]
      properties:
        id:
          type: string
        text:
          type: string
        citations:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Citation'
        confidence:
          type: number
          minimum: 0
          maximum: 1

    Citation:
      type: object
      required: [document_ref, page, region, excerpt_hash, trace_ref]
      properties:
        document_ref:
          type: string
        page:
          type: integer
        region:
          type: array
          items:
            type: number
          minItems: 4
          maxItems: 4
        excerpt_hash:
          type: string
        trace_ref:
          type: string

    SummaryBlock:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, abstained]
        abstain_reason:
          type: [string, "null"]
        assertions:
          type: array
          items:
            $ref: '#/components/schemas/Assertion'

    ExtractionBlock:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, abstained]
        resources:
          type: array
          items:
            type: object
            additionalProperties: true

    CompletenessBlock:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, abstained]
        against:
          type: object
        satisfied:
          type: array
          items:
            type: object
            additionalProperties: true
        gaps:
          type: array
          items:
            type: object
            additionalProperties: true
        conflicts:
          type: array
          items:
            type: object
            additionalProperties: true

    TriageBlock:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, abstained]
        suggestion:
          type: string
          enum: [likely_meets, needs_rfi, route_to_clinician]
        confidence:
          type: number
          minimum: 0
          maximum: 1
        calibration_ref:
          type: string
        rationale_assertion_ids:
          type: array
          items:
            type: string

    Abstention:
      type: object
      required: [block, reason]
      properties:
        block:
          type: string
        reason:
          type: string

    FeedbackRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [target, action]
            properties:
              target:
                type: string
              action:
                type: string
                enum: [accepted, edited, overridden, flagged]
              reason_code:
                type: string
                enum: [incorrect, incomplete, irrelevant, hallucination_suspected, other]
              note:
                type: string
              replacement:
                oneOf:
                  - type: object
                    additionalProperties: true
                  - type: "null"

    Problem:
      type: object
      required: [type, code]
      properties:
        type:
          type: string
        code:
          type: string
        detail:
          type: string
        correlation_id:
          type: string
