type Query {
  worklist(
    state: String
    urgency: String
    lob: String
    first: Int
    after: String
  ): WorklistConnection!

  case(caseId: ID!): CaseDetail

  trace(traceRef: String!): TraceResult

  advisory(caseId: ID!, analysisId: ID): AdvisoryResult!
}

type Mutation {
  recordDecision(input: RecordDecisionInput!): RecordDecisionPayload!
  routeCase(input: RouteCaseInput!): RouteCasePayload!
}

type WorklistConnection {
  edges: [WorklistEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type WorklistEdge {
  node: CaseSummary!
  cursor: String!
}

type CaseSummary {
  caseId: ID!
  state: String!
  urgency: String!
  lob: String!
  memberRef: String
  createdAt: String!
  updatedAt: String!
}

type CaseDetail {
  caseId: ID!
  state: String!
  urgency: String!
  lob: String!
  channel: String!
  memberRef: String
  coverageRef: String
  pins: [ArtifactPin!]!
  linked: LinkedCases!
  serviceLines: [ServiceLine!]!
  determinations: [Determination!]!
  rfis: [Rfi!]!
}

type ArtifactPin {
  canonicalUrl: String!
  version: String!
}

type LinkedCases {
  appealOf: ID
  relatedCases: [ID!]!
}

type ServiceLine {
  lineId: ID!
  code: String!
  qty: Float!
  status: String!
}

type Determination {
  determinationId: ID!
  outcome: String!
  decidedBy: String!
  decidedAt: String!
}

type Rfi {
  rfiId: ID!
  status: String!
  dueBy: String!
}

type TraceResult {
  traceRef: String!
  rules: [String!]!
  raw: String
}

type AdvisoryResult {
  status: String!
  analysis_id: String
  result: AdvisoryDetail
}

type AdvisoryDetail {
  summary: AdvisorySummary
  triage: AdvisoryTriage
}

type AdvisorySummary {
  status: String!
  assertions: [AdvisoryAssertion!]
}

type AdvisoryAssertion {
  id: ID!
  text: String!
  confidence: Float!
  citations: [AdvisoryCitation!]!
}

type AdvisoryCitation {
  documentRef: String!
  page: Int!
}

type AdvisoryTriage {
  status: String!
  suggestion: String
  confidence: Float
}

input RecordDecisionInput {
  caseId: ID!
  outcome: String!
  rationale: String
  decisionNote: String
  perLine: [PerLineInput!]
}

input PerLineInput {
  lineId: ID!
  outcome: String!
}

type RecordDecisionPayload {
  determinationId: ID
  error: String
  errorCode: String
}

input RouteCaseInput {
  caseId: ID!
  toQueue: String!
  reason: String
}

type RouteCasePayload {
  taskId: ID
  error: String
}

type PageInfo {
  hasNextPage: Boolean!
  endCursor: String
}
