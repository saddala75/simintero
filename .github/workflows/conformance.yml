name: Conformance
on:
  schedule:
    - cron: "0 4 * * 1"  # Weekly Monday 4am UTC
  workflow_dispatch:

jobs:
  fhir-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # C3a: fhir-facade retired; FHIR conformance is covered by interop ITs (PasSubmitIT/CdsServicesIT/DtrLaunchIT)
      - name: Run Inferno US Core conformance
        run: npx --yes inferno-program-suite --base-url http://localhost:8080/fhir
      - name: Run Inferno SMART App Launch
        run: npx --yes inferno-program-suite --suite smart-app-launch --base-url http://localhost:8080/fhir
