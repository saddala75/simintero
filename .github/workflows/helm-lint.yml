name: Helm Lint

on:
  pull_request:
    paths:
      - 'infra/k8s/**'
      - 'infra/argocd/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Update chart dependencies
        run: |
          for chart in infra/k8s/*/; do
            if [[ -f "$chart/Chart.yaml" ]]; then
              helm dependency update "$chart"
            fi
          done

      - name: Lint all charts
        run: |
          failed=0
          for chart in infra/k8s/*/; do
            if [[ ! -f "$chart/Chart.yaml" ]]; then
              continue
            fi
            chart_name=$(basename "$chart")
            if [[ -f "${chart}values-pooled.yaml" ]]; then
              values_flag="-f ${chart}values-pooled.yaml"
            elif [[ -f "${chart}values-enclave.yaml" ]]; then
              values_flag="-f ${chart}values-enclave.yaml"
            else
              values_flag=""
            fi
            echo "Linting $chart_name..."
            if ! helm lint "$chart" $values_flag; then
              echo "FAIL: $chart_name"
              failed=1
            fi
          done
          exit $failed

      - name: Validate ArgoCD YAML
        run: |
          kubectl apply --dry-run=client -f infra/argocd/project.yaml
          python3 -c "
          import yaml, sys
          with open('infra/argocd/applicationset.yaml') as f:
              docs = list(yaml.safe_load_all(f))
          print(f'ArgoCD YAML valid: {len(docs)} document(s)')
          "
