name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'platform/services/**'
      - 'modules/**'
      - 'integration/**'
      - 'apps/web/**'
      - 'infra/k8s/**'
      - '.github/workflows/build-images.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: document-service
            context: .
            dockerfile: platform/services/document/Dockerfile
          - name: model-gateway
            context: .
            dockerfile: platform/services/model-gateway/Dockerfile
          - name: control-plane
            context: .
            dockerfile: platform/services/control-plane/Dockerfile
          - name: enstellar-case
            context: .
            dockerfile: modules/enstellar/case/Dockerfile
          - name: enstellar-comms
            context: .
            dockerfile: modules/enstellar/comms/Dockerfile
          - name: enstellar-workspace-bff
            context: .
            dockerfile: modules/enstellar/workspace-bff/Dockerfile
          - name: revital-pipeline
            context: .
            dockerfile: modules/revital/pipeline/Dockerfile
          - name: qualitron-execution
            context: .
            dockerfile: modules/qualitron/execution/Dockerfile
          - name: claims-service
            context: .
            dockerfile: modules/claims/service/Dockerfile
          - name: automation-service
            context: .
            dockerfile: modules/automation/service/Dockerfile
          - name: market-bundles
            context: .
            dockerfile: modules/market-bundles/service/Dockerfile
          - name: search-query-api
            context: .
            dockerfile: modules/search/query-api/Dockerfile
          - name: analytics-service
            context: .
            dockerfile: modules/analytics/service/Dockerfile
          - name: enstellar-workflow
            context: .
            dockerfile: modules/enstellar/workflow/Dockerfile
          - name: enstellar-clock
            context: .
            dockerfile: modules/enstellar/clock/Dockerfile
          - name: fhir-facade
            context: integration/fhir-facade
            dockerfile: integration/fhir-facade/Dockerfile
            maven: integration/fhir-facade
          - name: x12-translator
            context: integration/x12-translator
            dockerfile: integration/x12-translator/Dockerfile
            maven: integration/x12-translator
          - name: digicore-runtime
            context: modules/digicore/runtime
            dockerfile: modules/digicore/runtime/Dockerfile
            maven: modules/digicore/runtime
          - name: reviewer-workspace
            context: .
            dockerfile: apps/web/reviewer-workspace/Dockerfile
          - name: saas-admin
            context: .
            dockerfile: apps/web/saas-admin/Dockerfile
          - name: provisioning-console
            context: .
            dockerfile: apps/web/provisioning-console/Dockerfile
          - name: support-console
            context: .
            dockerfile: apps/web/support-console/Dockerfile
          - name: ai-ops-console
            context: .
            dockerfile: apps/web/ai-ops-console/Dockerfile
          - name: vsac-proxy
            context: .
            dockerfile: integration/connectors/vsac/Dockerfile
          - name: cds-hooks
            context: .
            dockerfile: integration/connectors/cds-hooks/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (for Maven builds)
        if: matrix.maven != ''
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR (Java services only)
        if: matrix.maven != ''
        run: mvn package -DskipTests -q
        working-directory: ${{ matrix.maven }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/simintero/${{ matrix.name }}:${{ github.sha }}
            ghcr.io/simintero/${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
