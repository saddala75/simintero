name: CI
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: simintero_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
      redpanda:
        image: redpandadata/redpanda:v24.1.1
        ports: ["9092:9092"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - name: Apply Flyway migrations to test DB
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}/platform/services/db-migrations/migrations:/flyway/sql:ro" \
            flyway/flyway:10-alpine \
            -url=jdbc:postgresql://localhost:5432/simintero_test \
            -user=postgres -password=test \
            -locations=filesystem:/flyway/sql -connectRetries=10 migrate
      - run: pnpm rls-harness
        env:
          DATABASE_URL: postgresql://postgres:test@localhost/simintero_test

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # gate needs full history + origin/main for the baseline diff
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install 'datamodel-code-generator>=0.25' pydantic jinja2 genson pytest
      - run: pnpm install --frozen-lockfile
      - run: python3 contracts/codegen/generate.py
      - run: pnpm --filter @sim/contracts test
      - run: python3 -m pytest contracts/codegen/test_python_roundtrip.py -v
      - run: git fetch origin main --depth=1 || true   # ensure baseline ref exists for the gate
      - run: node contracts/scripts/check-breaking-changes.js

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency scan
        uses: anchore/scan-action@v4
        with: { path: ".", fail-build: true, severity-cutoff: high }
      - name: Secret scan
        uses: trufflesecurity/trufflehog@v3
        with: { path: ./,  base: ${{ github.event.pull_request.base.sha }}, head: ${{ github.event.pull_request.head.sha }} }
      - name: SAST
        uses: github/codeql-action/analyze@v3
        with:
          languages: "javascript,java"

  import-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - name: Check import rules (skip if package not yet created)
        run: |
          if pnpm --filter @sim/import-linter ls 2>/dev/null | grep -q import-linter; then
            pnpm --filter @sim/import-linter run check
          else
            echo "::notice::@sim/import-linter not yet created — skipping import rule check"
          fi

  java-libs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: mvn -f platform/libs/tenant-context/java/pom.xml -B test
      - run: mvn -f platform/libs/authz-client/java/pom.xml -B test

  enstellar-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: '3.12' }
      - run: uv sync --all-packages --all-groups
      - run: bash scripts/check-no-legacy-contracts.sh
      - run: uv run pytest platform/libs/outbox/py platform/libs/tenant-context/py platform/libs/authz-client/py platform/conformance-kit -q
      - run: uv run pytest services/enstellar-connectors -q -m "not integration"
      - run: uv run pytest services/enstellar-workflow -q
      - run: uv run pytest services/enstellar-portal-bff -q

  enstellar-interop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: gradle }
      - run: mvn -f platform/libs/tenant-context/java/pom.xml install -DskipTests
      - run: cd services/enstellar-interop && ./gradlew test --console=plain
