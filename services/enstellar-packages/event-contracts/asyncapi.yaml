asyncapi: 2.6.0

info:
  title: Enstellar Event Contracts
  version: 1.0.0
  description: |
    AsyncAPI catalog for all Kafka events emitted by Enstellar services.

    Every message conforms to the EventEnvelope schema defined in
    packages/event-contracts/schema/event_envelope.json.

    All topics are partitioned by tenant_id. No event may cross a tenant boundary.

    The production broker address is supplied via the KAFKA_BOOTSTRAP_SERVERS
    environment variable, which overrides the dev default below.

servers:
  kafka:
    url: localhost:9092
    protocol: kafka
    description: |
      Local development broker (make up).
      Production: set KAFKA_BOOTSTRAP_SERVERS to the bootstrap server list for
      your environment (e.g. broker1:9092,broker2:9092).

# ---------------------------------------------------------------------------
# Channels — one per topic. All channels are partitioned by tenant_id.
# Fully documented: case.adverse.structured
# All others carry minimal documentation; full payload schemas are out of
# scope for v1.0.0 of this catalog and will be added per-channel as specs land.
# ---------------------------------------------------------------------------

channels:

  # ── Case lifecycle ─────────────────────────────────────────────────────────

  case.intake.received:
    x-partition-key: tenant_id
    description: >
      Emitted when a new prior-authorization intake is received and persisted.
      Triggers initial normalization and eligibility checks.
    subscribe:
      operationId: onCaseIntakeReceived
      message:
        name: CaseIntakeReceived
        summary: New PA case intake received.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  case.state.transitioned:
    x-partition-key: tenant_id
    description: >
      Emitted on every successful state-machine transition.
      Payload carries from_state and to_state strings.
    subscribe:
      operationId: onCaseStateTransitioned
      message:
        name: CaseStateTransitioned
        summary: Workflow state machine transition completed.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  case.pended:
    x-partition-key: tenant_id
    description: >
      Emitted when a case is placed in a pended/hold state awaiting
      additional information or reviewer action.
    subscribe:
      operationId: onCasePended
      message:
        name: CasePended
        summary: Case placed in pended/hold state.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  case.assigned:
    x-partition-key: tenant_id
    description: >
      Emitted when a case is assigned (or reassigned) to a reviewer or queue.
    subscribe:
      operationId: onCaseAssigned
      message:
        name: CaseAssigned
        summary: Case assigned to reviewer or queue.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  case.closed:
    x-partition-key: tenant_id
    description: >
      Emitted when a case reaches a terminal state (approved, denied, withdrawn,
      or expired). Downstream consumers stop all active SLA clocks.
    subscribe:
      operationId: onCaseClosed
      message:
        name: CaseClosed
        summary: Case reached terminal state.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  case.normalized:
    x-partition-key: tenant_id
    description: >
      Emitted after intake data has been normalized into the canonical model
      (FHIR resources mapped, X12 decoded, terminology resolved).
    subscribe:
      operationId: onCaseNormalized
      message:
        name: CaseNormalized
        summary: Case intake normalized into canonical model.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  # ── SLA / Clock ────────────────────────────────────────────────────────────

  clock.started:
    x-partition-key: tenant_id
    description: Emitted when a regulatory or payer SLA clock is started for a case.
    subscribe:
      operationId: onClockStarted
      message:
        name: ClockStarted
        summary: SLA clock started.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  clock.paused:
    x-partition-key: tenant_id
    description: >
      Emitted when a clock is paused (e.g. waiting for RFI response; clock
      pauses are regulated — only valid pause reasons are accepted).
    subscribe:
      operationId: onClockPaused
      message:
        name: ClockPaused
        summary: SLA clock paused.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  clock.resumed:
    x-partition-key: tenant_id
    description: Emitted when a previously paused SLA clock resumes.
    subscribe:
      operationId: onClockResumed
      message:
        name: ClockResumed
        summary: SLA clock resumed.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  clock.breached:
    x-partition-key: tenant_id
    description: >
      Emitted when an SLA clock expires without the required action having
      been completed. Triggers escalation and audit workflows.
    subscribe:
      operationId: onClockBreached
      message:
        name: ClockBreached
        summary: SLA clock breached — deadline missed.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  clock.stopped:
    x-partition-key: tenant_id
    description: >
      Emitted when an SLA clock is stopped (normal completion or case closure).
    subscribe:
      operationId: onClockStopped
      message:
        name: ClockStopped
        summary: SLA clock stopped.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  # ── RFI (Request for Information) ─────────────────────────────────────────

  rfi.requested:
    x-partition-key: tenant_id
    description: Emitted when a reviewer creates an RFI for additional clinical information.
    subscribe:
      operationId: onRfiRequested
      message:
        name: RfiRequested
        summary: RFI created by reviewer.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  rfi.dispatched:
    x-partition-key: tenant_id
    description: >
      Emitted when an RFI is dispatched to the requesting provider
      (fax, portal notification, or FHIR messaging).
    subscribe:
      operationId: onRfiDispatched
      message:
        name: RfiDispatched
        summary: RFI dispatched to requesting provider.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  rfi.response.received:
    x-partition-key: tenant_id
    description: >
      Emitted when a response to an outstanding RFI is received and linked
      to the case. Typically resumes a paused SLA clock.
    subscribe:
      operationId: onRfiResponseReceived
      message:
        name: RfiResponseReceived
        summary: RFI response received from provider.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  # ── Notifications ──────────────────────────────────────────────────────────

  notification.sent:
    x-partition-key: tenant_id
    description: >
      Emitted after an outbound notification (AAN letter, portal alert, fax)
      has been queued or delivered by the comms service.
    subscribe:
      operationId: onNotificationSent
      message:
        name: NotificationSent
        summary: Outbound notification dispatched.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  # ── Decision ───────────────────────────────────────────────────────────────

  decision.recorded:
    x-partition-key: tenant_id
    description: >
      Emitted when a coverage determination (approve / deny / partial / modify)
      is recorded with a human sign-off. See also case.adverse.structured for
      the structured adverse payload emitted in tandem with adverse decisions.
    subscribe:
      operationId: onDecisionRecorded
      message:
        name: DecisionRecorded
        summary: Coverage determination recorded with human sign-off.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  # ── Agent / AI Assist ──────────────────────────────────────────────────────

  agent.assist.produced:
    x-partition-key: tenant_id
    description: >
      Emitted when an AI agent completes an advisory assist (summary, gap
      analysis, etc.). Payload carries confidence, citations, and abstained flag.
      INVARIANT: agent output is advisory only and must not directly trigger
      any adverse determination or state transition.
    subscribe:
      operationId: onAgentAssistProduced
      message:
        name: AgentAssistProduced
        summary: AI advisory assist completed.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  agent.assist.failed:
    x-partition-key: tenant_id
    description: >
      Emitted when an AI agent invocation fails or the guardrail engine
      rejects the output. Consumers must handle this gracefully (fall back
      to human-only workflow).
    subscribe:
      operationId: onAgentAssistFailed
      message:
        name: AgentAssistFailed
        summary: AI advisory assist failed or guardrail-rejected.
        payload:
          $ref: '#/components/schemas/EventEnvelope'

  # ── Adverse — fully documented ─────────────────────────────────────────────

  case.adverse.structured:
    x-partition-key: tenant_id
    description: |
      Emitted after a human clinician has recorded an adverse determination
      and the workflow engine has structured the finding sections, reason codes,
      and citations into the canonical adverse payload.

      Downstream consumers use this event to:
        - Generate adverse-action notices (AAN / NOA) meeting state and federal
          turnaround requirements.
        - Start the member appeal-window clock.
        - Feed quality and audit dashboards.

      INVARIANT (non-negotiable): This event is ONLY emitted after a recorded
      human sign-off. No automated or AI-only code path may emit this event.
      The actor field in the envelope MUST identify the authorizing human.
    subscribe:
      operationId: onCaseAdverseStructured
      message:
        $ref: '#/components/messages/CaseAdverseStructured'

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------

components:

  messages:
    CaseAdverseStructured:
      name: CaseAdverseStructured
      title: case.adverse.structured — Structured adverse determination
      summary: >
        Adverse determination event with fully structured finding sections,
        reason codes, citations, and clinical rationale. Emitted only after
        human clinician sign-off.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/CaseAdverseStructuredEnvelope'
      examples:
        - name: full-denial
          summary: Full denial example
          payload:
            event_id: "a1b2c3d4-0000-0000-0000-111111111111"
            tenant_id: "acme-health"
            case_id: "f9e8d7c6-0000-0000-0000-222222222222"
            correlation_id: "corr-001"
            type: "case.adverse.structured"
            occurred_at: "2026-06-07T14:30:00Z"
            schema_version: "1.0.0"
            actor:
              id: "dr-jane-doe"
              type: "user"
            payload:
              determination_type: "denied"
              finding_sections:
                - criterion_id: "MCG-23.1"
                  text: "Documentation does not support medical necessity for inpatient admission."
                  status: "gap"
                - criterion_id: "MCG-23.2"
                  text: "Outpatient treatment options not exhausted."
                  status: "unknown"
              reason_codes:
                - "B15"
                - "ICD10-Z71.89"
              citations:
                - "MCG Adult Ambulatory Care Guidelines, 23rd Ed., §3.1"
                - "CMS LCD L37987"
              reason: >
                Clinical documentation does not support the necessity of inpatient
                level of care. Criteria for acute admission have not been met based
                on submitted records.

  schemas:

    # ── Base EventEnvelope (minimal — used by non-fully-documented channels) ──

    EventEnvelope:
      type: object
      description: >
        Canonical event envelope. Every event emitted by any Enstellar service
        must conform to this schema. Payload structure is event-type specific;
        see the fully-documented channel entries in this catalog.
      required:
        - event_id
        - tenant_id
        - correlation_id
        - type
        - occurred_at
        - actor
        - payload
        - schema_version
      additionalProperties: false
      properties:
        event_id:
          type: string
          format: uuid
          description: >
            Globally unique event identifier. Consumers use this for
            idempotency (deduplicate on event_id).
        tenant_id:
          type: string
          description: >
            Tenant that owns this event. Required on every event.
            No cross-tenant event propagation is permitted.
        case_id:
          type: string
          format: uuid
          nullable: true
          description: PA case this event belongs to (null for non-case system events).
        correlation_id:
          type: string
          description: >
            Spans a logical operation across multiple events and services.
            Propagate unchanged through all downstream processing.
        type:
          type: string
          description: >
            Dot-separated event type matching the channel name,
            e.g. case.state.transitioned, clock.breached.
          pattern: '^[a-z][a-z0-9]*(?:\.[a-z][a-z0-9]*)+$'
        occurred_at:
          type: string
          format: date-time
          description: When the event occurred (business time), in UTC ISO-8601.
        actor:
          type: object
          description: Who or what caused this event.
          required:
            - id
            - type
          additionalProperties: false
          properties:
            id:
              type: string
              description: Identifier of the actor (user ID, service name, etc.).
            type:
              type: string
              enum: [user, system, service]
              description: >
                user — a human principal;
                system — the workflow engine or scheduler;
                service — an internal microservice.
        payload:
          type: object
          description: >
            Event-type-specific data. Structure defined per event type in
            this AsyncAPI catalog.
        schema_version:
          type: string
          description: Semver string of the payload schema, e.g. '1.0.0'.
          pattern: '^\d+\.\d+\.\d+$'

    # ── case.adverse.structured — fully documented envelope ──────────────────

    CaseAdverseStructuredEnvelope:
      type: object
      description: >
        EventEnvelope specialised for the case.adverse.structured event.
        The payload property carries the fully structured adverse determination data.
      required:
        - event_id
        - tenant_id
        - correlation_id
        - type
        - occurred_at
        - actor
        - payload
        - schema_version
      additionalProperties: false
      properties:
        event_id:
          type: string
          format: uuid
          description: Globally unique event identifier for idempotent consumers.
        tenant_id:
          type: string
          description: Owning tenant. Required. No cross-tenant propagation.
        case_id:
          type: string
          format: uuid
          nullable: true
          description: PA case this adverse event belongs to.
        correlation_id:
          type: string
          description: Logical operation correlation ID; propagate downstream.
        type:
          type: string
          enum:
            - case.adverse.structured
          description: Must be exactly "case.adverse.structured".
        occurred_at:
          type: string
          format: date-time
          description: When the adverse determination was recorded, in UTC ISO-8601.
        actor:
          type: object
          description: |
            The clinician or authorizing human who signed off on the adverse
            determination.

            INVARIANT: actor.type must be "user" for this event. No automated
            system or AI agent may be the sole actor on an adverse event.
          required:
            - id
            - type
          additionalProperties: false
          properties:
            id:
              type: string
              description: >
                User identifier of the reviewing clinician or medical director
                who signed off on the adverse determination.
            type:
              type: string
              enum: [user]
              description: >
                Must be "user" for adverse events — only a human principal
                may be the actor. A non-user value is a schema violation and
                indicates a misconfigured or non-compliant emission.
        schema_version:
          type: string
          enum:
            - "1.0.0"
          description: >
            Payload schema version. Must be "1.0.0" for this revision of the
            catalog. Increment according to semver when the payload shape changes.
        payload:
          type: object
          description: >
            Structured adverse determination data. All fields are nullable to
            support legacy callers that may emit partial payloads; consumers
            must treat null as "not provided" and degrade gracefully.
          properties:
            determination_type:
              type: string
              enum:
                - denied
                - partially_denied
                - adverse_modification
              description: |
                The class of adverse action taken:
                  denied              — full denial of the requested service/procedure.
                  partially_denied    — service approved in part and denied in part
                                        (e.g. fewer units than requested).
                  adverse_modification — approved but with modifications that differ
                                        materially from what was requested.
            finding_sections:
              type: array
              nullable: true
              description: >
                One entry per clinical criterion evaluated during the review.
                Each section records the criterion identifier, the associated
                clinical finding text, and whether the criterion had a gap or
                was indeterminate.
              items:
                type: object
                required:
                  - criterion_id
                  - text
                  - status
                properties:
                  criterion_id:
                    type: string
                    description: >
                      Identifier of the clinical criterion assessed, e.g. an MCG
                      guideline code or an internal payer criterion ID.
                  text:
                    type: string
                    description: >
                      Clinical finding narrative for this criterion as recorded
                      or confirmed by the reviewing clinician.
                  status:
                    type: string
                    enum:
                      - gap
                      - unknown
                    description: |
                      Coverage status of the criterion:
                        gap     — criterion not met; evidence is absent or
                                  contradicts the criterion.
                        unknown — insufficient evidence to determine whether
                                  the criterion is met.
            reason_codes:
              type: array
              nullable: true
              description: >
                ICD-10, CPT, or payer-defined reason codes that substantiate
                the adverse finding. Used to populate AAN/NOA letters and
                populate claims editing systems.
              items:
                type: string
                description: >
                  Single code string, e.g. "B15", "ICD10-Z71.89", or a payer
                  internal denial reason code.
            citations:
              type: array
              nullable: true
              description: >
                Policy documents, clinical guidelines, or regulatory references
                that support the adverse determination. Included verbatim in
                the adverse-action notice.
              items:
                type: string
                description: >
                  Human-readable citation string, e.g.
                  "MCG Adult Ambulatory Care Guidelines, 23rd Ed., §3.1" or
                  "CMS LCD L37987".
            reason:
              type: string
              nullable: true
              description: >
                Free-text clinical rationale written or confirmed by the
                reviewing clinician. Included in the member-facing adverse-action
                notice. Must not contain PHI beyond what is clinically necessary
                for the notice; the PHI redaction pipeline is applied before
                logging but NOT before transmission in the notice.
