spring:
  application:
    name: x12-translator
x12:
  trading-partners:
    default:
      default-lob: commercial
      urgency-code-map:
        "1": standard
        "2": expedited
        "3": concurrent
    expedited-partner:
      default-lob: medicaid
      urgency-code-map:
        "U": expedited
        "R": standard
minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_X12_BUCKET:x12-raw}
