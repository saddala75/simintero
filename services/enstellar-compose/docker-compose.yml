name: enstellar-local

services:
  # ── Databases ──────────────────────────────────────────────────────────────

  hapi-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hapi
      POSTGRES_USER: hapi
      POSTGRES_PASSWORD: ${HAPI_DB_PASSWORD:-hapi_secret}
    volumes:
      - hapi-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  workflow-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: workflow
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: ${WORKFLOW_DB_PASSWORD:-workflow_secret}
    ports:
      - "${WORKFLOW_DB_PORT:-5432}:5432"
    volumes:
      - workflow-db-data:/var/lib/postgresql/data
      - ./init/workflow-db-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── HAPI FHIR ──────────────────────────────────────────────────────────────

  hapi:
    image: hapiproject/hapi:v7.4.0
    expose:
      - "8080"
    depends_on:
      hapi-db:
        condition: service_healthy
    environment:
      spring.datasource.url: jdbc:postgresql://hapi-db:5432/hapi
      spring.datasource.username: hapi
      spring.datasource.password: ${HAPI_DB_PASSWORD:-hapi_secret}
      spring.datasource.driverClassName: org.postgresql.Driver
      spring.jpa.properties.hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgres94Dialect
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_multiple_delete: "true"
      hapi.fhir.allow_external_references: "true"
      hapi.fhir.validation.requests_enabled: "true"
      hapi.fhir.validation.responses_enabled: "false"
      hapi.fhir.implementationguides[0].name: hl7.fhir.us.core
      hapi.fhir.implementationguides[0].version: 5.0.1
      hapi.fhir.implementationguides[0].reloadExisting: "false"
      hapi.fhir.implementationguides[1].name: hl7.fhir.us.davinci-pas
      hapi.fhir.implementationguides[1].version: 2.0.1
      hapi.fhir.implementationguides[1].reloadExisting: "false"
    volumes:
      - ./healthcheck/healthcheck.jar:/healthcheck.jar:ro
    healthcheck:
      # hapiproject/hapi is distroless (no shell, no wget/curl); use a tiny pre-compiled
      # Java HTTP health-check JAR mounted read-only from infra/compose/healthcheck/.
      test: ["CMD", "java", "-jar", "/healthcheck.jar", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s

  interop:
    build:
      context: ../enstellar-interop
      dockerfile: Dockerfile
    expose:
      - "8080"
    depends_on:
      hapi-db:
        condition: service_healthy
      hapi:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      mock-digicore:
        condition: service_healthy
    environment:
      INTEROP_DB_URL: jdbc:postgresql://hapi-db:5432/hapi
      DIGICORE_BASE_URL: http://mock-digicore:8000
      INTEROP_DB_USER: hapi
      INTEROP_DB_PASSWORD: ${HAPI_DB_PASSWORD:-hapi_secret}
      HAPI_BASE_URL: http://hapi:8080/fhir
      HAPI_PROXY_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
      MINIO_BUCKET: enstellar-raw-bundles
      NORMALIZATION_URL: http://workflow-engine:8000
      KEYCLOAK_ISSUER_URI: http://localhost:8081/realms/enstellar
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/enstellar/protocol/openid-connect/certs
      EXPECTED_AUDIENCE: enstellar-api
    volumes:
      - ./healthcheck/healthcheck.jar:/healthcheck.jar:ro
    healthcheck:
      test: ["CMD", "java", "-jar", "/healthcheck.jar", "http://localhost:8080/fhir/metadata"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s

  agent-layer:
    build:
      context: ../enstellar-agent-layer
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      ENSTELLAR_MODEL_PROVIDER: ${ENSTELLAR_MODEL_PROVIDER:-ollama}
      ENSTELLAR_MODEL_NAME: ${ENSTELLAR_MODEL_NAME:-llama3}
      ENSTELLAR_OLLAMA_BASE_URL: http://ollama:11434
      ENSTELLAR_ANTHROPIC_API_KEY: ${ENSTELLAR_ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  workflow-engine:
    build:
      context: ../enstellar-workflow
      dockerfile: Dockerfile
    expose:
      - "8000"
    depends_on:
      workflow-db:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
      agent-layer:
        condition: service_healthy
    environment:
      WORKFLOW_DB_URL: postgresql+asyncpg://workflow:${WORKFLOW_DB_PASSWORD:-workflow_secret}@workflow-db:5432/workflow
      WORKFLOW_KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      WORKFLOW_AGENT_LAYER_URL: http://agent-layer:8000
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
      MINIO_BUCKET: enstellar-raw-bundles
      DIGICORE_BASE_URL: http://mock-digicore:8000
      REVITAL_BASE_URL: http://mock-revital:8000
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  portal-bff:
    build:
      context: ../enstellar-portal-bff
      dockerfile: Dockerfile
    expose:
      - "8001"
    depends_on:
      workflow-engine:
        condition: service_healthy
      interop:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      BFF_WORKFLOW_ENGINE_URL: http://workflow-engine:8000
      BFF_FHIR_API_URL: http://interop:8080/fhir
      BFF_CRD_API_URL: http://interop:8080/cds-services
      BFF_KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/enstellar/protocol/openid-connect/certs
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: ../enstellar-portal
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      portal-bff:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  inferno:
    build:
      context: inferno
      dockerfile: Dockerfile
    profiles: ["conformance"]
    platform: linux/amd64
    depends_on:
      interop:
        condition: service_healthy
    environment:
      FHIR_BASE_URL: http://interop:8080/fhir
    ports:
      - "4567:4567"

  # ── Kafka (Redpanda) ────────────────────────────────────────────────────────

  redpanda:
    image: redpandadata/redpanda:v24.1.7
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
    ports:
      - "${REDPANDA_KAFKA_PORT:-9092}:9092"
      - "29092:29092"
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Object Store (MinIO) ────────────────────────────────────────────────────

  minio:
    image: minio/minio:RELEASE.2024-06-04T19-20-08Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc alias set local http://127.0.0.1:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD --api S3v4 > /dev/null 2>&1 && mc ready local"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Search (OpenSearch) ────────────────────────────────────────────────────

  opensearch:
    image: opensearchproject/opensearch:2.14.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Cache (Redis) ──────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Identity (Keycloak) ────────────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://workflow-db:5432/keycloak
      KC_DB_USERNAME: workflow
      KC_DB_PASSWORD: ${WORKFLOW_DB_PASSWORD:-workflow_secret}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_URL: http://localhost:8081
      TEST_CLIENT_SECRET: ${TEST_CLIENT_SECRET:-test-secret}
      E2E_PASSWORD: ${E2E_PASSWORD:-e2e-pass}
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ./keycloak/enstellar-realm.json:/opt/keycloak/data/import/enstellar-realm.json:ro
      # CI only: mount the test client/user overlay. Remove in production deployments.
      # In production, use docker-compose.override.yml or a separate compose profile.
      - ./keycloak/enstellar-realm-ci-overlay.json:/opt/keycloak/data/import/enstellar-realm-ci-overlay.json:ro
    depends_on:
      workflow-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; printf 'GET /realms/master HTTP/1.0\\r\\nHost: 127.0.0.1\\r\\n\\r\\n' >&3; read -t 5 line <&3; [[ \"$$line\" == *200* ]]"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Local LLM (Ollama) ─────────────────────────────────────────────────────

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama

  # ── Mock Digicore ──────────────────────────────────────────────────────────

  mock-digicore:
    build:
      context: mocks/digicore
      dockerfile: Dockerfile
    ports:
      - "${MOCK_DIGICORE_PORT:-8090}:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mock Revital ───────────────────────────────────────────────────────────

  mock-revital:
    build:
      context: mocks/revital
      dockerfile: Dockerfile
    ports:
      - "${MOCK_REVITAL_PORT:-8091}:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hapi-db-data:
  workflow-db-data:
  minio-data:
  opensearch-data:
  ollama-data:
